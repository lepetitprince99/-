{% extends 'base.html' %}
{% block title %}관광지 등록 — 가보자고{% endblock %}

{% block content %}
<div class="page-header-simple">
  <div class="container">
    <h1 class="page-title">📍 관광지 등록</h1>
    <p class="page-subtitle text-muted">새로운 관광지 정보를 등록하세요</p>
  </div>
</div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="form-card">
        <form method="POST" action="{{ url_for('spots.create') }}" novalidate>

          <div class="row g-3 mb-3">
            <div class="col-md-8">
              <label class="form-label fw-bold" for="name">관광지 이름 *</label>
              <input type="text" class="form-control" id="name" name="name"
                     value="{{ form.get('name', '') if form else '' }}"
                     placeholder="관광지 이름을 입력하세요" required />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold" for="category">카테고리 *</label>
              <select class="form-select" id="category" name="category" required>
                <option value="">선택하세요</option>
                {% for cat in categories %}
                <option value="{{ cat }}"
                  {% if form and form.get('category') == cat %}selected{% endif %}>
                  {{ cat }}
                </option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold" for="region">지역 *</label>
            <select class="form-select" id="region" name="region" required>
              <option value="">지역을 선택하세요</option>
              {% for r in regions %}
              <option value="{{ r }}"
                {% if form and form.get('region') == r %}selected{% endif %}>
                {{ r }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold" for="description">설명 *</label>
            <textarea class="form-control" id="description" name="description"
                      rows="5" placeholder="관광지에 대한 자세한 설명을 입력하세요"
                      required>{{ form.get('description', '') if form else '' }}</textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold" for="address">주소</label>
            <input type="text" class="form-control" id="address" name="address"
                   value="{{ form.get('address', '') if form else '' }}"
                   placeholder="예: 서울특별시 종로구 사직로 161" />
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold" for="image_url">이미지 URL</label>
            <input type="url" class="form-control" id="image_url" name="image_url"
                   value="{{ form.get('image_url', '') if form else '' }}"
                   placeholder="https://..." />
            <div class="form-text">공공 API 또는 외부 이미지 URL을 입력하세요.</div>

            <!-- Image Preview -->
            <div id="imgPreviewWrap" class="mt-3" style="display:none;">
              <img id="imgPreview" src="" alt="미리보기"
                   class="img-fluid rounded" style="max-height: 200px;" />
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-5">
              <i class="fas fa-plus me-1"></i>등록하기
            </button>
            <a href="{{ url_for('spots.list_spots') }}" class="btn btn-outline-secondary">
              취소
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // 이미지 URL 미리보기
  const urlInput = document.getElementById('image_url');
  const preview  = document.getElementById('imgPreview');
  const previewWrap = document.getElementById('imgPreviewWrap');

  urlInput.addEventListener('input', function () {
    const url = this.value.trim();
    if (url) {
      preview.src = url;
      previewWrap.style.display = 'block';
      preview.onerror = () => { previewWrap.style.display = 'none'; };
    } else {
      previewWrap.style.display = 'none';
    }
  });
</script>
{% endblock %}
