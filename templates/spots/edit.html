{% extends 'base.html' %}
{% block title %}{{ spot.name }} 수정 — 가보자고{% endblock %}

{% block content %}
<div class="page-header-simple">
  <div class="container">
    <h1 class="page-title">✏️ 관광지 수정</h1>
    <p class="page-subtitle text-muted">{{ spot.name }}의 정보를 수정하세요</p>
  </div>
</div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="form-card">
        <form method="POST"
              action="{{ url_for('spots.edit', spot_id=spot._id) }}" novalidate>

          <div class="row g-3 mb-3">
            <div class="col-md-8">
              <label class="form-label fw-bold" for="name">관광지 이름 *</label>
              <input type="text" class="form-control" id="name" name="name"
                     value="{{ spot.name }}" required />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold" for="category">카테고리 *</label>
              <select class="form-select" id="category" name="category" required>
                {% for cat in categories %}
                <option value="{{ cat }}"
                  {% if spot.category == cat %}selected{% endif %}>
                  {{ cat }}
                </option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold" for="region">지역 *</label>
            <select class="form-select" id="region" name="region" required>
              {% for r in regions %}
              <option value="{{ r }}"
                {% if spot.region == r %}selected{% endif %}>
                {{ r }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold" for="description">설명 *</label>
            <textarea class="form-control" id="description" name="description"
                      rows="5" required>{{ spot.description }}</textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold" for="address">주소</label>
            <input type="text" class="form-control" id="address" name="address"
                   value="{{ spot.address or '' }}" />
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold" for="image_url">이미지 URL</label>
            <input type="url" class="form-control" id="image_url" name="image_url"
                   value="{{ spot.image_url or '' }}"
                   placeholder="https://..." />
            <div id="imgPreviewWrap" class="mt-3"
                 style="{{ 'display:block' if spot.image_url else 'display:none' }}">
              <img id="imgPreview" src="{{ spot.image_url or '' }}"
                   alt="미리보기" class="img-fluid rounded"
                   style="max-height: 200px;" />
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning px-5 fw-bold">
              <i class="fas fa-save me-1"></i>저장하기
            </button>
            <a href="{{ url_for('spots.detail', spot_id=spot._id) }}"
               class="btn btn-outline-secondary">
              취소
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const urlInput = document.getElementById('image_url');
  const preview  = document.getElementById('imgPreview');
  const previewWrap = document.getElementById('imgPreviewWrap');

  urlInput.addEventListener('input', function () {
    const url = this.value.trim();
    if (url) {
      preview.src = url;
      previewWrap.style.display = 'block';
      preview.onerror = () => { previewWrap.style.display = 'none'; };
    } else {
      previewWrap.style.display = 'none';
    }
  });
</script>
{% endblock %}
