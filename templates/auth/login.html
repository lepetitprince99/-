{% extends 'base.html' %}
{% block title %}로그인 — 가보자고{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header text-center mb-4">
      <a href="{{ url_for('main.index') }}" class="text-decoration-none">
        <i class="fa-solid fa-earth-asia fa-2x text-primary mb-3 d-block"></i>
      </a>
      <h2 class="fw-bold mb-1">로그인</h2>
      <p class="text-muted small">계정에 로그인하세요</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="username"
               name="username" placeholder="사용자명"
               value="{{ request.form.get('username', '') }}" required />
        <label for="username"><i class="fas fa-user me-2"></i>사용자명</label>
      </div>

      <div class="form-floating mb-4">
        <input type="password" class="form-control" id="password"
               name="password" placeholder="비밀번호" required />
        <label for="password"><i class="fas fa-lock me-2"></i>비밀번호</label>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold mb-3">
        <i class="fas fa-sign-in-alt me-2"></i>로그인
      </button>
    </form>

    <p class="text-center text-muted small">
      계정이 없으신가요?
      <a href="{{ url_for('auth.register') }}" class="fw-bold text-primary text-decoration-none">
        회원가입
      </a>
    </p>
  </div>
</div>
{% endblock %}
